# cPanel Git Version Control deployment tasks.
#
# This file lives at the ROOT of the `babal-deploy` branch (the CI workflow
# copies it into the standalone bundle). When you click "Deploy HEAD Commit" in
# cPanel → Git Version Control, cPanel runs these tasks from the cloned repo
# working tree. They sync the pre-built app into the Node.js App directory and
# restart Passenger by touching tmp/restart.txt.
#
# DEPLOYDIR uses $HOME so it resolves correctly regardless of the account's
# home path (e.g. /home3/vramanho). It must point at the cPanel Node.js App
# "Application root" — if the app root isn't "vraman-app", change the suffix.
---
deployment:
  tasks:
    # rsync is not installed on the shared host, so copy with cp. Clear the app
    # dir (except tmp/) first to drop stale files, then copy the bundle's known
    # top-level entries (everything on babal-deploy except .git and .cpanel.yml).
    - export DEPLOYDIR="$HOME/vraman-app"
    - /bin/mkdir -p "$DEPLOYDIR/tmp"
    - /usr/bin/find "$DEPLOYDIR" -mindepth 1 -maxdepth 1 ! -name tmp -exec /bin/rm -rf {} +
    - /bin/cp -a server.js passenger.js package.json public .next node_modules src "$DEPLOYDIR/"
    - /bin/touch "$DEPLOYDIR/tmp/restart.txt"
